<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハクスラRPG</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

#game{
    max-width:520px;
    margin:auto;
    padding-bottom:100px;
}

h1{
    text-align:center;
}

.panel{
    background:#222;
    margin:10px;
    padding:12px;
    border-radius:12px;
}

.enemy{
    text-align:center;
    margin-top:30px;
}

.big{
    font-size:28px;
    font-weight:bold;
}

.hpbar{
    width:100%;
    height:22px;
    background:#444;
    border-radius:10px;
    overflow:hidden;
    margin-top:5px;
}

.hpfill{
    height:100%;
    background:#ff4444;
    width:100%;
}

button{
    border:none;
    border-radius:10px;
    padding:10px;
    margin:5px;
    background:#444;
    color:white;
}

.item{
    background:#333;
    margin-top:8px;
    padding:10px;
    border-radius:10px;
}

.tabbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    display:flex;
    background:#1a1a1a;
}

.tab{
    flex:1;
    text-align:center;
    padding:15px 0;
}

.active{
    background:#333;
}

.hidden{
    display:none;
}

.effect{
    position:fixed;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    background:#00aa66;
    padding:10px 20px;
    border-radius:10px;
    animation:fade 1s forwards;
    z-index:999;
}

@keyframes fade{
    0%{opacity:1;}
    100%{opacity:0; top:40px;}
}
</style>
</head>

<body>

<div id="game">

<h1>ハクスラRPG</h1>

<div id="battleTab">

<div class="panel enemy">

<div id="floor" class="big">1F</div>

<div style="margin-top:15px;">
敵：<span id="enemyName"></span>
</div>

<div class="hpbar">
<div class="hpfill" id="enemyHpFill"></div>
</div>

<div id="enemyHpText"></div>

<div id="battleLog" style="margin-top:10px;"></div>

</div>

<div class="panel">

<div>Lv : <span id="level"></span></div>

<div>HP : <span id="hp"></span> / <span id="maxHp"></span></div>

<div class="hpbar">
<div class="hpfill" id="playerHpFill"></div>
</div>

<div>攻撃 : <span id="atk"></span></div>

<div>防御 : <span id="def"></span></div>

<div>攻撃速度 : <span id="speed"></span></div>

<div>EXP : <span id="exp"></span> / <span id="needExp"></span></div>

<div>ゴールド : <span id="gold"></span></div>

<div>ガチャアイテム : <span id="gachaStone"></span></div>

<div>強化素材 : <span id="upgradeStone"></span></div>

</div>

</div>

<div id="equipTab" class="hidden">

<div class="panel">

<div class="big">装備一覧</div>

<div id="equipList"></div>

</div>

</div>

<div id="playerTab" class="hidden">

<div class="panel">

<div class="big">プレイヤー強化</div>

<div>ポイント : <span id="point"></span></div>

<button onclick="addStat('hp')">HP+</button>
<button onclick="addStat('atk')">攻撃+</button>
<button onclick="addStat('def')">防御+</button>

</div>

</div>

<div id="gachaTab" class="hidden">

<div class="panel">

<div class="big">ガチャ</div>

<button onclick="gacha()">ガチャを引く</button>

<div id="gachaResult" style="margin-top:10px;"></div>

</div>

</div>

</div>

<div class="tabbar">

<div class="tab active" onclick="showTab('battleTab',this)">戦闘</div>
<div class="tab" onclick="showTab('equipTab',this)">装備</div>
<div class="tab" onclick="showTab('playerTab',this)">強化</div>
<div class="tab" onclick="showTab('gachaTab',this)">ガチャ</div>

</div>

<script>

let save = JSON.parse(localStorage.getItem("hackRpgSave2"));

let player = save || {

floor:1,

level:1,
exp:0,

gold:0,

gachaStone:0,

upgradeStone:0,

point:0,

baseHp:100,
baseAtk:10,
baseDef:5,

speed:1,

hp:100,

equipments:[],

weapon:null

};

let enemy = {};

function calcStats(){

let atk = player.baseAtk;
let def = player.baseDef;
let maxHp = player.baseHp;

if(player.weapon){

let w = player.weapon;

let value =
Math.floor(
w.atk *
(1 + w.upgrade * 0.1)
);

atk += value;

}

player.maxHp = Math.floor(maxHp);
player.atk = Math.floor(atk);
player.def = Math.floor(def);

if(player.hp > player.maxHp){
player.hp = player.maxHp;
}

}

function needExp(){

return Math.floor(
50 * Math.pow(1.15, player.level)
);

}

function createEnemy(){

enemy = {

name:
player.floor % 5 === 0
?
"ボス"
:
"スライム",

maxHp:
Math.floor(
50 * Math.pow(1.12, player.floor)
),

hp:0,

atk:
Math.floor(
5 * Math.pow(1.1, player.floor)
)

};

enemy.hp = enemy.maxHp;

draw();

}

function attack(){

calcStats();

let damage =
Math.max(
1,
player.atk -
Math.floor(player.floor / 2)
);

enemy.hp -= damage;

if(enemy.hp < 0){
enemy.hp = 0;
}

document.getElementById("battleLog").innerHTML =
"与ダメージ : " + damage;

if(enemy.hp <= 0){

winBattle();

}else{

enemyAttack();

}

draw();

}

function enemyAttack(){

let damage =
Math.max(
1,
enemy.atk - player.def
);

player.hp -= damage;

if(player.hp < 0){
player.hp = 0;
}

document.getElementById("battleLog").innerHTML +=
"<br>被ダメージ : " + damage;

if(player.hp <= 0){

player.floor =
Math.max(1, player.floor - 1);

player.hp = player.maxHp;

showEffect("敗北…");

createEnemy();

}

}

function winBattle(){

let gold =
Math.floor(
20 * Math.pow(1.13, player.floor)
);

let exp =
Math.floor(
10 * Math.pow(1.12, player.floor)
);

player.gold += gold;
player.exp += exp;

player.gachaStone +=
player.floor % 5 === 0 ? 3 : 1;

player.upgradeStone +=
player.floor % 5 === 0 ? 5 : 1;

showEffect(
"勝利！ +" + gold + "G"
);

while(player.exp >= needExp()){

player.exp -= needExp();

player.level++;

player.point += 5;

player.baseHp += 20;

player.hp = player.maxHp;

showEffect(
"レベルアップ！"
);

}

player.floor++;

createEnemy();

saveGame();

}

function addStat(type){

if(player.point <= 0) return;

player.point--;

if(type === "hp"){

player.baseHp += 20;
player.hp += 20;

}

if(type === "atk"){

player.baseAtk += 5;

}

if(type === "def"){

player.baseDef += 3;

}

showEffect("強化成功！");

calcStats();

draw();

saveGame();

}

function gacha(){

if(player.gachaStone <= 0){

document.getElementById("gachaResult").innerHTML =
"ガチャアイテム不足";

return;

}

player.gachaStone--;

let rarity;

let rand = Math.random() * 100;

if(rand < 60){

rarity = "N";

}else if(rand < 85){

rarity = "R";

}else if(rand < 97){

rarity = "SR";

}else{

rarity = "SSR";

}

let rarityRate = {

N:[1,5],
R:[6,10],
SR:[11,20],
SSR:[21,35]

};

let range = rarityRate[rarity];

let atk =
Math.floor(
Math.random() *
(range[1] - range[0] + 1)
)
+
range[0];

atk *= Math.floor(
Math.pow(1.08, player.floor)
);

let equipment = {

name:rarity + " 武器",

rarity,

atk,

upgrade:0

};

player.equipments.push(equipment);

document.getElementById("gachaResult").innerHTML =
rarity + " 武器獲得！";

saveGame();

draw();

}

function equipWeapon(index){

player.weapon =
player.equipments[index];

showEffect("装備変更！");

calcStats();

draw();

saveGame();

}

function upgradeWeapon(index){

let eq = player.equipments[index];

let cost =
Math.floor(
100 * Math.pow(1.25, eq.upgrade)
);

if(player.gold < cost){

showEffect("ゴールド不足");

return;

}

player.gold -= cost;

eq.upgrade++;

showEffect("強化成功！");

calcStats();

draw();

saveGame();

}

function draw(){

calcStats();

document.getElementById("floor").innerHTML =
player.floor + "F";

document.getElementById("enemyName").innerHTML =
enemy.name;

document.getElementById("enemyHpText").innerHTML =
enemy.hp + " / " + enemy.maxHp;

document.getElementById("enemyHpFill").style.width =
(enemy.hp / enemy.maxHp * 100) + "%";

document.getElementById("level").innerHTML =
player.level;

document.getElementById("hp").innerHTML =
Math.floor(player.hp);

document.getElementById("maxHp").innerHTML =
player.maxHp;

document.getElementById("playerHpFill").style.width =
(player.hp / player.maxHp * 100) + "%";

document.getElementById("atk").innerHTML =
player.atk;

document.getElementById("def").innerHTML =
player.def;

document.getElementById("speed").innerHTML =
player.speed;

document.getElementById("exp").innerHTML =
player.exp;

document.getElementById("needExp").innerHTML =
needExp();

document.getElementById("gold").innerHTML =
Math.floor(player.gold);

document.getElementById("gachaStone").innerHTML =
player.gachaStone;

document.getElementById("upgradeStone").innerHTML =
player.upgradeStone;

document.getElementById("point").innerHTML =
player.point;

let html = "";

player.equipments.forEach((e,index)=>{

let finalAtk =
Math.floor(
e.atk *
(1 + e.upgrade * 0.1)
);

html += `

<div class="item">

${e.name}<br>

レア : ${e.rarity}<br>

攻撃 : ${finalAtk}<br>

強化 : +${e.upgrade}<br>

<button onclick="equipWeapon(${index})">
装備
</button>

<button onclick="upgradeWeapon(${index})">
強化
</button>

</div>

`;

});

document.getElementById("equipList").innerHTML =
html;

}

function showTab(id,btn){

document.querySelectorAll(
"#battleTab,#equipTab,#playerTab,#gachaTab"
).forEach(e=>{

e.classList.add("hidden");

});

document.getElementById(id)
.classList.remove("hidden");

document.querySelectorAll(".tab")
.forEach(e=>{

e.classList.remove("active");

});

btn.classList.add("active");

}

function saveGame(){

localStorage.setItem(
"hackRpgSave2",
JSON.stringify(player)
);

}

function showEffect(text){

let div =
document.createElement("div");

div.className = "effect";

div.innerHTML = text;

document.body.appendChild(div);

setTimeout(()=>{

div.remove();

},1000);

}

createEnemy();

draw();

setInterval(()=>{

attack();

},1000);

</script>

</body>
</html>
