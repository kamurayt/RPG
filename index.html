<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハクスラRPG</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

#game{
max-width:540px;
margin:auto;
padding-bottom:90px;
}

.panel{
background:#222;
margin:10px;
padding:12px;
border-radius:12px;
}

.big{
font-size:26px;
font-weight:bold;
}

.hpbar{
height:20px;
background:#444;
border-radius:10px;
overflow:hidden;
margin:5px 0;
}

.hpfill{
height:100%;
background:#ff4444;
width:100%;
}

button,select{
border:none;
border-radius:8px;
padding:8px;
margin:4px;
background:#444;
color:white;
}

.item{
background:#333;
margin:8px 0;
padding:8px;
border-radius:10px;
font-size:14px;
}

.equipped{
border:2px solid gold;
}

.tabbar{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
background:#181818;
}

.tab{
flex:1;
text-align:center;
padding:12px 0;
font-size:13px;
}

.active{
background:#333;
}

.hidden{
display:none;
}

.effect{
position:fixed;
top:80px;
left:50%;
transform:translateX(-50%);
background:#00aa66;
padding:10px 20px;
border-radius:10px;
animation:fade 1s forwards;
z-index:999;
}

@keyframes fade{
0%{opacity:1;}
100%{opacity:0;top:40px;}
}

.log{
color:#ffd54f;
line-height:1.5;
}
</style>
</head>

<body>

<div id="game">

<div id="battleTab">

<div class="panel">

<div class="big">
<span id="floor"></span>
</div>

<div>
敵：
<span id="enemyName"></span>
</div>

<div>
敵攻撃：
<span id="enemyAtk"></span>
</div>

<div class="hpbar">
<div class="hpfill" id="enemyHpFill"></div>
</div>

<div id="enemyHpText"></div>

<div id="battleLog" class="log"></div>

</div>

<div class="panel">

<div>Lv：<span id="level"></span></div>

<div>
HP：
<span id="hp"></span>
/
<span id="maxHp"></span>
</div>

<div class="hpbar">
<div class="hpfill" id="playerHpFill"></div>
</div>

<div>攻撃：<span id="atk"></span></div>
<div>防御：<span id="def"></span></div>

<div>
ゲーム速度：
<span id="gameSpeed"></span>
%
</div>

<div>
連撃率：
<span id="multiRate"></span>
%
</div>

<div>
階層スキップ：
<span id="floorSkip"></span>
</div>

<div>EXP：<span id="exp"></span></div>

<div>ゴールド：<span id="gold"></span></div>

<div>ガチャ：<span id="gachaStone"></span></div>

<div>強化素材：<span id="upgradeStone"></span></div>

<div>覚醒素材：<span id="awakeStone"></span></div>

</div>

</div>

<div id="equipTab" class="hidden">

<div class="panel">

<div class="big">装備</div>

<select onchange="sortType=this.value;draw();">

<option value="new">
新着順
</option>

<option value="rarity">
レア順
</option>

<option value="atk">
攻撃順
</option>

<option value="upgrade">
強化順
</option>

<option value="awake">
覚醒順
</option>

<option value="gold">
ゴールドOP
</option>

<option value="speed">
ゲーム速度OP
</option>

<option value="multi">
連撃OP
</option>

<option value="skip">
階層スキップOP
</option>

</select>

<br>

<button onclick="sellAll('N')">
N以下売却
</button>

<button onclick="sellAll('R')">
R以下売却
</button>

<button onclick="sellAll('HR')">
HR以下売却
</button>

<button onclick="sellAll('SR')">
SR以下売却
</button>

<div id="equipList"></div>

</div>

</div>

<div id="playerTab" class="hidden">

<div class="panel">

<div class="big">
ステータスポイント強化
</div>

<div>
ポイント：
<span id="point"></span>
</div>

<button onclick="addStat('hp')">
HP強化
</button>

<button onclick="addStat('atk')">
攻撃強化
</button>

<button onclick="addStat('def')">
防御強化
</button>

</div>

</div>

</div>

<div class="tabbar">

<div class="tab active"
onclick="showTab('battleTab',this)">
戦闘
</div>

<div class="tab"
onclick="showTab('equipTab',this)">
装備
</div>

<div class="tab"
onclick="showTab('playerTab',this)">
強化
</div>

</div>

<script>

let save =
JSON.parse(
localStorage.getItem("hackRpgMega")
);

let player =
save || {

floor:1,

level:1,

hp:100,
maxHp:100,

baseAtk:10,
baseDef:5,

gold:0,

exp:0,

gachaStone:0,

upgradeStone:0,

awakeStone:0,

point:0,

gameSpeed:0,

multiRate:0,

floorSkip:0,

atkCount:0,
defCount:0,
hpCount:0,

equipments:[],

weaponIndex:null

};

let enemy = {};

let sortType = "new";

const rarityOrder = [
"N","R","HR","SR","SSR",
"UR","LR","MR","GR","EX",
"Z","ZZ","ZZZ","Ω",
"神","超神","創世","終焉","虚無"
];

const rarityColors = {

N:"#aaa",
R:"#4caf50",
HR:"#03a9f4",
SR:"#9c27b0",
SSR:"#ffd700",
UR:"#ff4444",
LR:"#ff00ff",
MR:"#ff8800",
GR:"#fff",
EX:"#00ffff",
Z:"#66ffcc",
ZZ:"#66ccff",
ZZZ:"#cc66ff",
"Ω":"#ff66cc",
"神":"#ffff66",
"超神":"#ffcc00",
"創世":"#00ff99",
"終焉":"#9999ff",
"虚無":"#dddddd"

};

function calcStats(){

let atk = player.baseAtk;
let def = player.baseDef;

player.gameSpeed = 0;
player.multiRate = 0;
player.floorSkip = 0;

if(
player.weaponIndex !== null &&
player.equipments[player.weaponIndex]
){

let e =
player.equipments[player.weaponIndex];

atk += finalEquipAtk(e);

applyOption(e.option1);
applyOption(e.option2);
applyOption(e.option3);

}

player.atk = Math.floor(atk);
player.def = Math.floor(def);

}

function applyOption(op){

if(op.includes("ゲーム速度")){

player.gameSpeed += getPercent(op);

}

if(op.includes("連撃率")){

player.multiRate += getPercent(op);

}

if(op.includes("階層スキップ")){

player.floorSkip += getPercent(op);

}

}

function getPercent(text){

return Number(
text.match(/\d+/)[0]
);

}

function finalEquipAtk(e){

return Math.floor(
e.atk *
(1 + e.upgrade * 0.1) *
(1 + e.awake * 0.2)
);

}

function createEnemy(){

enemy = {

name:
player.floor % 5 === 0
?
"ボス"
:
enemyName(),

maxHp:
Math.floor(
50 * Math.pow(1.13, player.floor)
),

hp:0,

atk:
Math.floor(
5 * Math.pow(1.11, player.floor)
)

};

enemy.hp = enemy.maxHp;

draw();

}

function enemyName(){

const list = [
"スライム",
"ゴブリン",
"ウルフ",
"悪魔",
"ドラゴン"
];

return list[
player.floor % list.length
];

}

function attack(){

calcStats();

let dmg =
Math.max(
1,
player.atk -
Math.floor(player.floor / 2)
);

enemy.hp -= dmg;

if(enemy.hp < 0){
enemy.hp = 0;
}

let log =
"与ダメージ：" + dmg;

if(
Math.random() * 100 <
player.multiRate
){

enemy.hp -= dmg;

log +=
"<br>連撃発動！";

}

document.getElementById(
"battleLog"
).innerHTML = log;

if(enemy.hp <= 0){

winBattle();

}else{

enemyAttack();

}

draw();

}

function enemyAttack(){

let dmg =
Math.max(
1,
enemy.atk - player.def
);

player.hp -= dmg;

if(player.hp < 0){

player.hp = 0;

}

document.getElementById(
"battleLog"
).innerHTML +=
"<br>被ダメージ：" + dmg;

if(player.hp <= 0){

player.floor =
Math.max(
1,
player.floor - 1
);

player.hp =
player.maxHp;

showEffect("敗北");

createEnemy();

}

}

function winBattle(){

let gold =
Math.floor(
20 * Math.pow(1.14, player.floor)
);

let exp =
Math.floor(
10 * Math.pow(1.13, player.floor)
);

player.gold += gold;
player.exp += exp;

player.gachaStone +=
Math.floor(
1 * Math.pow(1.05, player.floor)
);

player.upgradeStone +=
Math.floor(
1 * Math.pow(1.04, player.floor)
);

if(player.floor % 5 === 0){

player.awakeStone +=
Math.floor(
2 * Math.pow(1.03, player.floor)
);

}

player.floor +=
1 + Math.floor(player.floorSkip / 100);

createEnemy();

saveGame();

}

function addStat(type){

if(player.point <= 0){

showEffect("ポイント不足");

return;

}

player.point--;

if(type === "atk"){

let add =
5 *
Math.pow(
2,
Math.floor(
player.atkCount / 100
)
);

player.baseAtk += add;

player.atkCount++;

showEffect(
"攻撃 +" + add
);

}

if(type === "def"){

let add =
3 *
Math.pow(
2,
Math.floor(
player.defCount / 100
)
);

player.baseDef += add;

player.defCount++;

showEffect(
"防御 +" + add
);

}

if(type === "hp"){

let add =
20 *
Math.pow(
2,
Math.floor(
player.hpCount / 100
)
);

player.maxHp += add;
player.hp += add;

player.hpCount++;

showEffect(
"HP +" + add
);

}

saveGame();

draw();

}

function createEquipment(){

let rarity =
rarityOrder[
randomInt(
0,
Math.min(
rarityOrder.length - 1,
Math.floor(player.floor / 10)
)
)
];

let atk =
Math.floor(
randomInt(1,10) *
Math.pow(
1.1,
player.floor
)
);

return {

name:"剣",

rarity,

atk,

upgrade:0,

awake:0,

option1:
randomOption(),

option2:
randomOption(),

option3:
randomOption()

};

}

function randomOption(){

const list = [

"攻撃力増加",

"防御力増加",

"ゲーム速度上昇",

"連撃率上昇",

"階層スキップ数"

];

let value =
randomInt(1,100);

return list[
randomInt(
0,
list.length - 1
)
]
+
" +" +
value +
"%";

}

function sellAll(rank){

if(
!confirm(rank + "以下を売却？")
)return;

let max =
rarityOrder.indexOf(rank);

let gainUp = 0;
let gainAw = 0;

player.equipments =
player.equipments.filter((e,i)=>{

if(i === player.weaponIndex)
return true;

let idx =
rarityOrder.indexOf(
e.rarity
);

if(idx <= max){

gainUp += idx + 1;

gainAw +=
Math.floor(idx / 2);

return false;

}

return true;

});

player.upgradeStone += gainUp;
player.awakeStone += gainAw;

showEffect(
"一括売却完了"
);

saveGame();

draw();

}

function sortedEquipments(){

let arr =
player.equipments.map(
(e,i)=>({e,i})
);

if(sortType === "rarity"){

arr.sort((a,b)=>

rarityOrder.indexOf(
b.e.rarity
)

-

rarityOrder.indexOf(
a.e.rarity
)

);

}

if(sortType === "atk"){

arr.sort((a,b)=>

finalEquipAtk(b.e)

-

finalEquipAtk(a.e)

);

}

if(sortType === "upgrade"){

arr.sort((a,b)=>

b.e.upgrade -
a.e.upgrade

);

}

if(sortType === "awake"){

arr.sort((a,b)=>

b.e.awake -
a.e.awake

);

}

if(sortType === "gold"){

arr.sort((a,b)=>

String(b.e.option1)
.includes("ゴールド")
?1:-1

);

}

if(sortType === "speed"){

arr.sort((a,b)=>

String(b.e.option1)
.includes("ゲーム速度")
?1:-1

);

}

if(sortType === "multi"){

arr.sort((a,b)=>

String(b.e.option1)
.includes("連撃")
?1:-1

);

}

if(sortType === "skip"){

arr.sort((a,b)=>

String(b.e.option1)
.includes("階層スキップ")
?1:-1

);

}

return arr.reverse();

}

function equipWeapon(index){

player.weaponIndex = index;

showEffect("装備変更");

saveGame();

draw();

}

function draw(){

calcStats();

document.getElementById(
"floor"
).innerHTML =
player.floor + "F";

document.getElementById(
"enemyName"
).innerHTML =
enemy.name;

document.getElementById(
"enemyAtk"
).innerHTML =
enemy.atk;

document.getElementById(
"enemyHpText"
).innerHTML =
enemy.hp +
" / " +
enemy.maxHp;

document.getElementById(
"enemyHpFill"
).style.width =
(enemy.hp / enemy.maxHp * 100)
+
"%";

document.getElementById(
"level"
).innerHTML =
player.level;

document.getElementById(
"hp"
).innerHTML =
Math.floor(player.hp);

document.getElementById(
"maxHp"
).innerHTML =
player.maxHp;

document.getElementById(
"playerHpFill"
).style.width =
(player.hp / player.maxHp * 100)
+
"%";

document.getElementById(
"atk"
).innerHTML =
player.atk;

document.getElementById(
"def"
).innerHTML =
player.def;

document.getElementById(
"gold"
).innerHTML =
Math.floor(player.gold);

document.getElementById(
"exp"
).innerHTML =
Math.floor(player.exp);

document.getElementById(
"gachaStone"
).innerHTML =
player.gachaStone;

document.getElementById(
"upgradeStone"
).innerHTML =
player.upgradeStone;

document.getElementById(
"awakeStone"
).innerHTML =
player.awakeStone;

document.getElementById(
"point"
).innerHTML =
player.point;

document.getElementById(
"gameSpeed"
).innerHTML =
player.gameSpeed;

document.getElementById(
"multiRate"
).innerHTML =
player.multiRate;

document.getElementById(
"floorSkip"
).innerHTML =
player.floorSkip;

let html = "";

sortedEquipments()
.forEach(({e,i})=>{

let eq =
player.weaponIndex === i;

html += `

<div class="item
${eq ? "equipped" : ""}
">

${eq ? "【装備中】" : ""}

<span style="
color:${rarityColors[e.rarity]}
">

${e.rarity}

</span>

${e.name}

<br>

攻撃 +
${finalEquipAtk(e)}

<br>

強化 +
${e.upgrade}

覚醒 +
${e.awake}

<br>

${e.option1}

<br>

${e.option2}

<br>

${e.option3}

<br>

<button
onclick="equipWeapon(${i})"
>

装備

</button>

</div>

`;

});

document.getElementById(
"equipList"
).innerHTML =
html;

}

function showTab(id,btn){

document.querySelectorAll(
"#battleTab,#equipTab,#playerTab"
).forEach(e=>
e.classList.add("hidden")
);

document.getElementById(id)
.classList.remove("hidden");

document.querySelectorAll(".tab")
.forEach(e=>
e.classList.remove("active")
);

btn.classList.add("active");

}

function saveGame(){

localStorage.setItem(
"hackRpgMega",
JSON.stringify(player)
);

}

function showEffect(text){

let d =
document.createElement("div");

d.className = "effect";

d.innerHTML = text;

document.body.appendChild(d);

setTimeout(()=>{

d.remove();

},1000);

}

function randomInt(min,max){

return Math.floor(
Math.random() *
(max - min + 1)
)
+
min;

}

createEnemy();

draw();

setInterval(()=>{

attack();

}, Math.max(
100,
1000 - player.gameSpeed * 5
));

</script>

</body>
</html>
