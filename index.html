<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Infinite Dungeon RPG</title>

<link rel="stylesheet" href="style.css?v=1.0.1">
</head>

<body>

<div id="version">
ver 1.0.1
</div>

<div id="game">

  <section id="battleTab">

    <div class="panel">
      <div class="title">
        <span id="dungeonName"></span>
        <span id="floorText"></span>
      </div>

      <div class="enemyLine">
        敵：
        <span id="enemyName"></span>
      </div>

      <div class="enemyLine">
        敵攻撃：
        <span id="enemyAtk"></span>
      </div>

      <div class="hpBar">
        <div id="enemyHpFill"></div>
      </div>

      <div id="enemyHpText"></div>
      <div id="battleLog"></div>
    </div>

    <div class="panel">
      <div class="title">ステータス</div>
      <div id="statusArea"></div>
    </div>

  </section>

  <section id="equipTab" class="hidden">

    <div class="panel">
      <div class="title">装備</div>

      <div id="slotButtons"></div>

      <select id="sortSelect" onchange="sortType=this.value;drawEquip();">
        <option value="new">新着順</option>
        <option value="rarity">レア順</option>
        <option value="power">戦力順</option>
        <option value="upgrade">強化順</option>
        <option value="awake">覚醒順</option>
      </select>

      <div class="smallTitle">一括売却</div>
      <div id="bulkSellButtons"></div>

      <div class="smallTitle">自動売却</div>
      <select id="autoSellSelect" onchange="setAutoSell(this.value)"></select>

      <div id="equipList"></div>
    </div>

  </section>

  <section id="playerTab" class="hidden">

    <div class="panel">
      <div class="title">ステータス強化</div>

      <div>
        ポイント：
        <span id="pointText"></span>
      </div>

      <div id="pointArea"></div>
    </div>

    <div class="panel">
      <div class="title">ゴールド強化</div>
      <div id="goldUpgradeArea"></div>
    </div>

  </section>

  <section id="gachaTab" class="hidden">

    <div class="panel">
      <div class="title">ガチャ</div>

      <div>
        ガチャLv：
        <span id="gachaLv"></span>
      </div>

      <div>
        ガチャEXP：
        <span id="gachaExp"></span>
        /
        <span id="needGachaExp"></span>
      </div>

      <div>
        ガチャアイテム：
        <span id="gachaStoneText"></span>
      </div>

      <hr>

      <div id="rateArea"></div>

      <button onclick="drawGacha(1)">1回</button>
      <button onclick="drawGacha(10)">10回</button>
      <button onclick="drawGacha(100)">100回</button>

      <div id="gachaResult"></div>
    </div>

  </section>

  <section id="dungeonTab" class="hidden">

    <div class="panel">
      <div class="title">ダンジョン</div>

      <div>
        現在：
        <span id="currentDungeon"></span>
      </div>

      <div>
        鍵：
        <span id="dungeonKey"></span>
      </div>

      <button onclick="changeDungeon('normal')">通常</button>
      <button onclick="changeDungeon('gold')">ゴールド</button>
      <button onclick="changeDungeon('upgrade')">強化素材</button>
      <button onclick="changeDungeon('awake')">覚醒素材</button>
      <button onclick="changeDungeon('gacha')">ガチャ</button>

      <div class="desc">
        ボス撃破でダンジョンキー獲得
      </div>
    </div>

  </section>

</div>

<div class="tabBar">

  <button class="tab activeTab" onclick="openTab('battleTab',this)">
    戦闘
  </button>

  <button class="tab" onclick="openTab('equipTab',this)">
    装備
  </button>

  <button class="tab" onclick="openTab('playerTab',this)">
    強化
  </button>

  <button class="tab" onclick="openTab('gachaTab',this)">
    ガチャ
  </button>

  <button class="tab" onclick="openTab('dungeonTab',this)">
    D
  </button>

</div>

<script src="data.js?v=1.0.1"></script>
<script src="save.js?v=1.0.1"></script>
<script src="state.js?v=1.0.1"></script>
<script src="equip.js?v=1.0.1"></script>
<script src="gacha.js?v=1.0.1"></script>
<script src="battle.js?v=1.0.1"></script>
<script src="ui.js?v=1.0.1"></script>
<script src="main.js?v=1.0.1"></script>

</body>
</html>
