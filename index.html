<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハクスラRPG</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    overflow-x:hidden;
}

#game{
    max-width:500px;
    margin:auto;
    padding-bottom:100px;
}

h1{
    text-align:center;
    margin-top:10px;
}

.panel{
    background:#222;
    border-radius:12px;
    padding:12px;
    margin:10px;
}

.center{
    text-align:center;
}

.hpbar{
    width:100%;
    height:20px;
    background:#444;
    border-radius:10px;
    overflow:hidden;
    margin-top:5px;
}

.hpfill{
    height:100%;
    background:#ff4444;
    width:100%;
}

.enemy{
    margin-top:40px;
    text-align:center;
}

.big{
    font-size:28px;
    font-weight:bold;
}

.damage{
    color:#ff7070;
    font-size:22px;
    margin-top:8px;
}

.heal{
    color:#70ff70;
}

button{
    border:none;
    border-radius:10px;
    padding:10px;
    margin:5px;
    background:#444;
    color:white;
    font-size:15px;
}

button:active{
    transform:scale(0.95);
}

.tabbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    display:flex;
    background:#1a1a1a;
    border-top:2px solid #333;
}

.tab{
    flex:1;
    text-align:center;
    padding:15px 0;
    background:#1a1a1a;
}

.active{
    background:#333;
}

.hidden{
    display:none;
}

.item{
    background:#333;
    margin:8px;
    padding:10px;
    border-radius:10px;
}

.effect{
    position:fixed;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    background:#00aa66;
    padding:10px 20px;
    border-radius:10px;
    animation:fade 1s forwards;
    z-index:999;
}

@keyframes fade{
    0%{opacity:1;}
    100%{opacity:0; top:40px;}
}
</style>
</head>

<body>

<div id="game">

<h1>ハクスラRPG</h1>

<div id="battleTab">

<div class="panel enemy">

<div id="floor" class="big">1F</div>

<div style="margin-top:20px;">
敵：<span id="enemyName"></span>
</div>

<div class="hpbar">
<div class="hpfill" id="enemyHpFill"></div>
</div>

<div id="enemyHpText"></div>

<div class="damage" id="damageText"></div>

</div>

<div class="panel">

<div>Lv : <span id="level"></span></div>
<div>HP : <span id="hp"></span> / <span id="maxHp"></span></div>

<div class="hpbar">
<div class="hpfill" id="playerHpFill"></div>
</div>

<div>攻撃 : <span id="atk"></span></div>
<div>防御 : <span id="def"></span></div>
<div>攻撃速度 : <span id="speed"></span></div>

<div style="margin-top:10px;">
EXP : <span id="exp"></span> / <span id="needExp"></span>
</div>

<div>ゴールド : <span id="gold"></span></div>

</div>

</div>

<div id="equipTab" class="hidden">

<div class="panel">
<div class="big center">装備</div>

<div class="item">
武器 : 木の剣<br>
攻撃 +10
<button onclick="upgradeWeapon()">強化</button>
</div>

</div>

</div>

<div id="playerTab" class="hidden">

<div class="panel">

<div class="big center">プレイヤー強化</div>

<div>ポイント : <span id="point"></span></div>

<button onclick="addStat('hp')">HP+</button>
<button onclick="addStat('atk')">攻撃+</button>
<button onclick="addStat('def')">防御+</button>

</div>

</div>

<div id="gachaTab" class="hidden">

<div class="panel center">

<div class="big">ガチャ</div>

<div style="margin-top:10px;">
ガチャアイテム : <span id="gachaStone"></span>
</div>

<button onclick="gacha()">ガチャを引く</button>

<div id="gachaResult" style="margin-top:15px;"></div>

</div>

</div>

</div>

<div class="tabbar">

<div class="tab active" onclick="showTab('battleTab',this)">戦闘</div>
<div class="tab" onclick="showTab('equipTab',this)">装備</div>
<div class="tab" onclick="showTab('playerTab',this)">強化</div>
<div class="tab" onclick="showTab('gachaTab',this)">ガチャ</div>

</div>

<script>

let save = JSON.parse(localStorage.getItem("rpgSave"));

let player = save || {

floor:1,
level:1,
exp:0,
gold:0,

hp:100,
maxHp:100,

atk:10,
def:5,

speed:1,

point:0,

weaponLv:1,

gachaStone:0

};

let enemy = {};

function needExp(){
return player.level * 20;
}

function createEnemy(){

enemy = {

name: player.floor % 5 === 0 ? "ボス" : "スライム",

maxHp:50 + player.floor * 15,
hp:50 + player.floor * 15,

atk:5 + player.floor * 3

};

draw();

}

function attack(){

let damage = Math.max(1, player.atk - Math.floor(player.floor/2));

enemy.hp -= damage;

document.getElementById("damageText").innerHTML =
"与ダメージ : " + damage;

if(enemy.hp <= 0){

enemy.hp = 0;

winBattle();

}else{

enemyAttack();

}

draw();

}

function enemyAttack(){

let damage = Math.max(1, enemy.atk - player.def);

player.hp -= damage;

document.getElementById("damageText").innerHTML +=
"<br>被ダメージ : " + damage;

if(player.hp <= 0){

player.hp = player.maxHp;

player.floor = Math.max(1, player.floor - 1);

showEffect("敗北…1階戻った");

createEnemy();

}

}

function winBattle(){

let gold = 20 + player.floor * 5;
let exp = 10 + player.floor * 3;

if(player.floor % 5 === 0){

gold *= 3;
exp *= 3;

player.gachaStone += 3;

}else{

player.gachaStone += 1;

}

player.gold += gold;
player.exp += exp;

showEffect("勝利！ +" + gold + "G");

if(player.exp >= needExp()){

player.exp -= needExp();

player.level++;

player.point += 5;

player.maxHp += 20;

player.hp = player.maxHp;

showEffect("レベルアップ！");

}

player.floor++;

createEnemy();

saveGame();

}

function addStat(type){

if(player.point <= 0) return;

player.point--;

if(type === "hp"){

player.maxHp += 20;
player.hp += 20;

}

if(type === "atk"){

player.atk += 5;

}

if(type === "def"){

player.def += 3;

}

showEffect("強化成功！");

draw();
saveGame();

}

function upgradeWeapon(){

let cost = player.weaponLv * 100;

if(player.gold < cost){

showEffect("ゴールド不足");

return;

}

player.gold -= cost;

player.weaponLv++;

player.atk += 10;

showEffect("武器強化成功！");

draw();
saveGame();

}

function gacha(){

if(player.gachaStone <= 0){

document.getElementById("gachaResult").innerHTML =
"ガチャアイテム不足";

return;

}

player.gachaStone--;

let rarity;

let rand = Math.random()*100;

if(rand < 60){

rarity = "N";

}else if(rand < 85){

rarity = "R";

}else if(rand < 97){

rarity = "SR";

}else{

rarity = "SSR";

}

document.getElementById("gachaResult").innerHTML =
rarity + "装備獲得！";

saveGame();

draw();

}

function draw(){

document.getElementById("floor").innerHTML =
player.floor + "F";

document.getElementById("enemyName").innerHTML =
enemy.name;

document.getElementById("enemyHpText").innerHTML =
enemy.hp + " / " + enemy.maxHp;

document.getElementById("enemyHpFill").style.width =
(enemy.hp / enemy.maxHp * 100) + "%";

document.getElementById("level").innerHTML =
player.level;

document.getElementById("hp").innerHTML =
player.hp;

document.getElementById("maxHp").innerHTML =
player.maxHp;

document.getElementById("playerHpFill").style.width =
(player.hp / player.maxHp * 100) + "%";

document.getElementById("atk").innerHTML =
player.atk;

document.getElementById("def").innerHTML =
player.def;

document.getElementById("speed").innerHTML =
player.speed;

document.getElementById("exp").innerHTML =
player.exp;

document.getElementById("needExp").innerHTML =
needExp();

document.getElementById("gold").innerHTML =
player.gold;

document.getElementById("point").innerHTML =
player.point;

document.getElementById("gachaStone").innerHTML =
player.gachaStone;

}

function saveGame(){

localStorage.setItem("rpgSave", JSON.stringify(player));

}

function showTab(id,btn){

document.querySelectorAll(".hidden, #battleTab, #equipTab, #playerTab, #gachaTab")
.forEach(e=>e.classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");

document.querySelectorAll(".tab")
.forEach(e=>e.classList.remove("active"));

btn.classList.add("active");

}

function showEffect(text){

let div = document.createElement("div");

div.className = "effect";

div.innerHTML = text;

document.body.appendChild(div);

setTimeout(()=>{
div.remove();
},1000);

}

createEnemy();

draw();

setInterval(()=>{
attack();
},1000);

</script>

</body>
</html>
