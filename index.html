<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Infinite Dungeon RPG</title>
<style>
body{margin:0;background:#101018;color:white;font-family:sans-serif}#version{position:fixed;top:5px;right:5px;background:#000;padding:4px 8px;border-radius:8px;z-index:9999;font-size:12px}#game{max-width:560px;margin:auto;padding-bottom:100px}.panel{background:#202030;margin:10px;padding:12px;border-radius:14px}.title{font-size:24px;font-weight:bold;margin-bottom:10px}.smallTitle{margin-top:14px;margin-bottom:6px;font-size:13px;color:#bbb}.enemyLine{margin:4px 0}.hpBar{width:100%;height:20px;background:#444;border-radius:999px;overflow:hidden;margin:10px 0}#enemyHpFill{width:100%;height:100%;background:#ff4444}button,select{background:#353545;color:white;border:none;border-radius:8px;padding:8px;margin:4px;font-size:14px}.item{background:#2a2a3a;padding:10px;margin:10px 0;border-radius:10px}.equipped{border:3px solid gold;box-shadow:0 0 12px gold;background:#3a3420}.activeSlot{background:#008f5a!important;box-shadow:0 0 8px #00d080}.hidden{display:none}.tabBar{position:fixed;bottom:0;left:0;width:100%;display:flex;background:#181820;z-index:9998}.tab{flex:1;border-radius:0;margin:0;padding:14px 0}.activeTab{background:#505070}#battleLog,#gachaResult{margin-top:10px;color:#ffd54f;line-height:1.5}.statLine{display:flex;justify-content:space-between;border-bottom:1px solid #333;padding:5px 0;gap:10px}.desc{margin-top:10px;color:#aaa;font-size:13px}.effect{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#00aa66;padding:10px 20px;border-radius:10px;z-index:9999;animation:fade 1s forwards}@keyframes fade{0%{opacity:1}100%{opacity:0;top:40px}}
</style>
</head>
<body>
<div id="version">ver 2.0.0</div>
<div id="game">
<section id="battleTab"><div class="panel"><div class="title"><span id="dungeonName"></span> <span id="floorText"></span></div><div class="enemyLine">敵：<span id="enemyName"></span></div><div class="enemyLine">敵攻撃：<span id="enemyAtk"></span></div><div class="hpBar"><div id="enemyHpFill"></div></div><div id="enemyHpText"></div><div id="battleLog"></div></div><div class="panel"><div class="title">ステータス</div><div id="statusArea"></div></div></section>
<section id="equipTab" class="hidden"><div class="panel"><div class="title">装備</div><div id="slotButtons"></div><select id="sortSelect" onchange="sortType=this.value;drawEquip();"><option value="new">新着順</option><option value="rarity">レア順</option><option value="power">戦力順</option><option value="upgrade">強化順</option><option value="awake">覚醒順</option><option value="exp">経験値OP</option><option value="gold">ゴールドOP</option><option value="gacha">ガチャOP</option><option value="upgradeMat">強化素材OP</option><option value="awakeMat">覚醒素材OP</option><option value="speed">ゲーム速度OP</option><option value="multi">連撃OP</option><option value="skip">階層スキップOP</option></select><div class="smallTitle">一括売却</div><div id="bulkSellButtons"></div><div class="smallTitle">自動売却</div><select id="autoSellSelect" onchange="setAutoSell(this.value)"></select><div id="equipList"></div></div></section>
<section id="playerTab" class="hidden"><div class="panel"><div class="title">ステータス強化</div><div>ポイント：<span id="pointText"></span></div><div id="pointArea"></div></div><div class="panel"><div class="title">ゴールド強化</div><div id="goldUpgradeArea"></div></div></section>
<section id="gachaTab" class="hidden"><div class="panel"><div class="title">ガチャ</div><div>ガチャLv：<span id="gachaLv"></span></div><div>ガチャEXP：<span id="gachaExp"></span> / <span id="needGachaExp"></span></div><div>ガチャアイテム：<span id="gachaStoneText"></span></div><hr><div id="rateArea"></div><button onclick="drawGacha(1)">1回</button><button onclick="drawGacha(10)">10回</button><button onclick="drawGacha(100)">100回</button><div id="gachaResult"></div></div></section>
<section id="dungeonTab" class="hidden"><div class="panel"><div class="title">ダンジョン</div><div>現在：<span id="currentDungeon"></span></div><div>鍵：<span id="dungeonKey"></span></div><button onclick="changeDungeon('normal')">通常</button><button onclick="changeDungeon('gold')">ゴールド</button><button onclick="changeDungeon('upgrade')">強化素材</button><button onclick="changeDungeon('awake')">覚醒素材</button><button onclick="changeDungeon('gacha')">ガチャ</button><div class="desc">ボス撃破でダンジョンキー獲得。特化ダンジョンは鍵を1個消費。</div></div></section>
</div>
<div class="tabBar"><button class="tab activeTab" onclick="openTab('battleTab',this)">戦闘</button><button class="tab" onclick="openTab('equipTab',this)">装備</button><button class="tab" onclick="openTab('playerTab',this)">強化</button><button class="tab" onclick="openTab('gachaTab',this)">ガチャ</button><button class="tab" onclick="openTab('dungeonTab',this)">D</button></div>
<script>
const SAVE_KEY="RPG_SINGLE_FILE_VER_2_0_0";
const slots=[["weapon","武器"],["head","頭"],["armor","鎧"],["pants","ズボン"],["shoes","靴"],["gloves","手袋"],["wing","羽"],["necklace","ネックレス"],["bracelet","腕輪"],["pet","ペット"]];
const rarityOrder=["N","R","HR","SR","SSR","UR","LR","MR","GR","EX","Z","ZZ","ZZZ","Ω","神","超神","創世","終焉","虚無"];
const rarityColors={N:"#999",R:"#4caf50",HR:"#03a9f4",SR:"#9c27b0",SSR:"#ffd700",UR:"#ff4444",LR:"#ff00ff",MR:"#ff8800",GR:"#fff",EX:"#00ffff",Z:"#66ffcc",ZZ:"#66ccff",ZZZ:"#cc66ff","Ω":"#ff66cc","神":"#ffff66","超神":"#ffcc00","創世":"#00ff99","終焉":"#9999ff","虚無":"#ddd"};
function defaultPlayer(){return{floor:1,level:1,exp:0,gold:0,gachaStone:30,upgradeStone:0,awakeStone:0,dungeonKey:0,point:0,baseHp:100,baseAtk:10,baseDef:5,hp:100,goldAtkLv:0,goldDefLv:0,gachaLv:1,gachaExp:0,equipments:[],equipped:{weapon:null,head:null,armor:null,pants:null,shoes:null,gloves:null,wing:null,necklace:null,bracelet:null,pet:null},dungeon:"normal",atkCount:0,defCount:0,hpCount:0,autoSell:"off"}}
function normalizeEquip(e){if(!e.id)e.id=Date.now().toString()+"_"+Math.random().toString(36).slice(2);if(e.option1&&!e.op1)e.op1=e.option1;if(e.option2&&!e.op2)e.op2=e.option2;if(e.option3&&!e.op3)e.op3=e.option3;if(!e.op1)e.op1="HP増加 +0%";if(!e.op2)e.op2="攻撃力増加 +0%";if(!e.op3)e.op3="防御力増加 +0%";if(e.awake===undefined)e.awake=0;if(e.upgrade===undefined)e.upgrade=0;if(e.quality===undefined)e.quality=100;if(e.atk===undefined)e.atk=0;if(e.def===undefined)e.def=0;if(e.hp===undefined)e.hp=0}
function loadGame(){const data=localStorage.getItem(SAVE_KEY);if(!data)return defaultPlayer();try{const saved=JSON.parse(data);const base=defaultPlayer();const merged={...base,...saved,equipped:{...base.equipped,...(saved.equipped||{})}};if(!Array.isArray(merged.equipments))merged.equipments=[];merged.equipments.forEach(e=>normalizeEquip(e));for(const [slot] of slots){const v=merged.equipped[slot];if(typeof v==="number"){const e=merged.equipments[v];merged.equipped[slot]=e?e.id:null}if(merged.equipped[slot]&&!merged.equipments.some(e=>e.id===merged.equipped[slot]))merged.equipped[slot]=null}return merged}catch{return defaultPlayer()}}
function saveGame(){localStorage.setItem(SAVE_KEY,JSON.stringify(player))}
let player=loadGame(),enemy={},currentTab="battleTab",equipFilter="all",sortType="new",bonus={};
function slotName(slot){return slots.find(s=>s[0]===slot)[1]}function equipName(slot){return{weapon:"ソード",head:"ヘルム",armor:"アーマー",pants:"レギンス",shoes:"ブーツ",gloves:"ガントレット",wing:"ウイング",necklace:"ネックレス",bracelet:"ブレスレット",pet:"ペット"}[slot]}function enemyName(){const list=["スライム","ゴブリン","オーク","ドラゴン","デーモン","フェニックス"];return list[player.floor%list.length]}function dungeonName(){return{normal:"通常",gold:"ゴールド",upgrade:"強化素材",awake:"覚醒素材",gacha:"ガチャ"}[player.dungeon]}
function resetBonus(){bonus={hp:0,atk:0,def:0,exp:0,gold:0,gacha:0,upgrade:0,awake:0,speed:0,multi:0,skip:0}}
function getNumber(text){const m=String(text).match(/\d+/);return m?Number(m[0]):0}function rarityIndex(r){return Math.max(0,rarityOrder.indexOf(r))}function unlockedRarityIndex(){return Math.min(rarityOrder.length-1,Math.floor((player.gachaLv-1)/8))}function unlockedRarities(){return rarityOrder.slice(0,unlockedRarityIndex()+1)}function needExp(){return Math.floor(50*Math.pow(1.18,player.level))}function needGachaExp(){return Math.floor(10+player.gachaLv*5)}function goldCost(lv){return Math.floor(100*Math.pow(1.25,lv))}function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function getEquipById(id){return player.equipments.find(e=>e.id===id)}
function calcStats(){resetBonus();let atk=player.baseAtk*(1+player.goldAtkLv*.1),def=player.baseDef*(1+player.goldDefLv*.1),hp=player.baseHp;for(const [slot] of slots){const id=player.equipped[slot];if(id!==null){const e=getEquipById(id);if(e){atk+=equipFinal(e,"atk");def+=equipFinal(e,"def");hp+=equipFinal(e,"hp");applyOption(e.op1);applyOption(e.op2);applyOption(e.op3)}else player.equipped[slot]=null}}atk*=1+bonus.atk/100;def*=1+bonus.def/100;hp*=1+bonus.hp/100;player.atk=Math.floor(atk);player.def=Math.floor(def);player.maxHp=Math.floor(hp);if(player.hp>player.maxHp)player.hp=player.maxHp}
function applyOption(op){if(!op)return;const v=getNumber(op);if(op.includes("HP"))bonus.hp+=v;if(op.includes("攻撃"))bonus.atk+=v;if(op.includes("防御"))bonus.def+=v;if(op.includes("経験値"))bonus.exp+=v;if(op.includes("ゴールド"))bonus.gold+=v;if(op.includes("ガチャ"))bonus.gacha+=v;if(op.includes("強化素材"))bonus.upgrade+=v;if(op.includes("覚醒素材"))bonus.awake+=v;if(op.includes("ゲーム速度"))bonus.speed+=v;if(op.includes("連撃"))bonus.multi+=v;if(op.includes("階層スキップ"))bonus.skip+=v}
function equipLimit(e){return 10+e.awake*10}function equipFinal(e,type){return Math.floor((e[type]||0)*(1+e.upgrade*.1)*(1+e.awake*.2))}function equipPower(e){return equipFinal(e,"atk")+equipFinal(e,"def")+Math.floor(equipFinal(e,"hp")/5)}function upgradeGoldCost(e){return Math.floor((80+rarityIndex(e.rarity)*25)*Math.pow(1.18,e.upgrade))}function upgradeStoneCost(e){return 1+Math.floor(e.upgrade/5)+rarityIndex(e.rarity)}function awakeStoneCost(e){return Math.floor((5+rarityIndex(e.rarity)*4)*Math.pow(e.awake+1,2))}
function createEquipment(){const rarity=rollRarity(),r=rarityIndex(rarity),slot=slots[rand(0,slots.length-1)][0],quality=rand(85,115),base=rand(1+r*8,8+r*12),floorBonus=Math.pow(1.08,player.floor),value=Math.floor(base*floorBonus*quality/100);const e={id:Date.now().toString()+"_"+Math.random().toString(36).slice(2),slot,name:equipName(slot),rarity,quality,atk:0,def:0,hp:0,upgrade:0,awake:0,op1:randomOption(rarity,slot),op2:randomOption(rarity,slot),op3:randomOption(rarity,slot)};if(slot==="weapon")e.atk=value*3;else if(["head","armor","pants","gloves"].includes(slot)){e.def=value*2;e.hp=value*5}else if(["shoes","wing"].includes(slot)){e.def=value;e.hp=value*3}else{e.atk=value;e.hp=value*2}return e}
function randomOption(rarity,slot){let list=["HP増加","攻撃力増加","防御力増加","獲得経験値増加","獲得ゴールド増加","獲得ガチャアイテム増加","獲得強化素材増加","獲得覚醒素材増加","ゲーム速度上昇","連撃率上昇","階層スキップ数"];if(slot==="shoes")list=list.concat(["ゲーム速度上昇","ゲーム速度上昇"]);if(slot==="wing")list=list.concat(["階層スキップ数","階層スキップ数"]);if(slot==="bracelet")list=list.concat(["連撃率上昇","連撃率上昇"]);if(slot==="necklace")list=list.concat(["獲得経験値増加","獲得ゴールド増加"]);if(slot==="pet")list=list.concat(["獲得ガチャアイテム増加","獲得強化素材増加","獲得覚醒素材増加"]);const r=rarityIndex(rarity),min=1+r*5,max=Math.min(100,min+4+r*2);return list[rand(0,list.length-1)]+" +"+rand(min,max)+"%"}
function isEquipped(index){const e=player.equipments[index];if(!e)return false;return Object.values(player.equipped).includes(e.id)}function equipItem(index){const e=player.equipments[index];if(!e)return;player.equipped[e.slot]=e.id;showEffect(slotName(e.slot)+"装備");saveGame();drawAll()}function removeEquipment(index){const e=player.equipments[index];if(!e)return;for(const key in player.equipped){if(player.equipped[key]===e.id)player.equipped[key]=null}player.equipments.splice(index,1)}function sellGain(e){const r=rarityIndex(e.rarity);return{upgrade:1+r*3+e.upgrade,awake:Math.floor(r/2)+e.awake}}
function sellEquip(index){if(isEquipped(index)){showEffect("装備中は売却不可");return}const e=player.equipments[index];if(!e)return;const gain=sellGain(e);player.upgradeStone+=gain.upgrade;player.awakeStone+=gain.awake;removeEquipment(index);showEffect("売却 強化+"+gain.upgrade+" 覚醒+"+gain.awake);saveGame();drawAll()}function sellAll(rarity){const limit=rarityIndex(rarity);let sold=0,up=0,aw=0;for(let i=player.equipments.length-1;i>=0;i--){const e=player.equipments[i];if(e&&!isEquipped(i)&&rarityIndex(e.rarity)<=limit){const gain=sellGain(e);up+=gain.upgrade;aw+=gain.awake;sold++;removeEquipment(i)}}player.upgradeStone+=up;player.awakeStone+=aw;showEffect(sold+"個売却");saveGame();drawAll()}
function upgradeEquip(index,times){const e=player.equipments[index];if(!e)return;let done=0;for(let i=0;i<times;i++){if(e.upgrade>=equipLimit(e))break;const gold=upgradeGoldCost(e),stone=upgradeStoneCost(e);if(player.gold<gold||player.upgradeStone<stone)break;player.gold-=gold;player.upgradeStone-=stone;e.upgrade++;done++}showEffect(done>0?"強化+"+done:"素材不足");saveGame();drawAll()}function upgradeEquipMax(index){upgradeEquip(index,999999)}function awakeEquip(index){const e=player.equipments[index];if(!e)return;const cost=awakeStoneCost(e);if(player.awakeStone<cost){showEffect("覚醒素材不足");return}player.awakeStone-=cost;e.awake++;showEffect("覚醒+"+e.awake);saveGame();drawAll()}
function optionScore(e,key){return [e.op1,e.op2,e.op3].filter(op=>op&&op.includes(key)).reduce((sum,op)=>sum+getNumber(op),0)}function sortedEquipments(){let list=player.equipments.map((e,i)=>({e,i}));if(equipFilter!=="all")list=list.filter(v=>v.e.slot===equipFilter);list.sort((a,b)=>{const ea=a.e,eb=b.e;if(sortType==="rarity")return rarityIndex(eb.rarity)-rarityIndex(ea.rarity);if(sortType==="power")return equipPower(eb)-equipPower(ea);if(sortType==="upgrade")return eb.upgrade-ea.upgrade;if(sortType==="awake")return eb.awake-ea.awake;if(sortType==="exp")return optionScore(eb,"経験値")-optionScore(ea,"経験値");if(sortType==="gold")return optionScore(eb,"ゴールド")-optionScore(ea,"ゴールド");if(sortType==="gacha")return optionScore(eb,"ガチャ")-optionScore(ea,"ガチャ");if(sortType==="upgradeMat")return optionScore(eb,"強化素材")-optionScore(ea,"強化素材");if(sortType==="awakeMat")return optionScore(eb,"覚醒素材")-optionScore(ea,"覚醒素材");if(sortType==="speed")return optionScore(eb,"ゲーム速度")-optionScore(ea,"ゲーム速度");if(sortType==="multi")return optionScore(eb,"連撃")-optionScore(ea,"連撃");if(sortType==="skip")return optionScore(eb,"階層スキップ")-optionScore(ea,"階層スキップ");return b.i-a.i});return list}function setEquipFilter(slot){equipFilter=slot;drawEquip()}function setAutoSell(value){player.autoSell=value;saveGame();drawEquip()}function shouldAutoSell(e){return player.autoSell!=="off"&&rarityIndex(e.rarity)<=rarityIndex(player.autoSell)}
function getRates(){const lv=player.gachaLv,rates={};rarityOrder.forEach((r,i)=>{const unlock=i*8+1;rates[r]=lv>=unlock?Math.max(.01,100/Math.pow(i+1,2.2)):0});const total=Object.values(rates).reduce((a,b)=>a+b,0);rarityOrder.forEach(r=>rates[r]=rates[r]/total*100);return rates}function rollRarity(){const rates=getRates(),randValue=Math.random()*100;let sum=0;for(const r of rarityOrder){sum+=rates[r];if(randValue<=sum)return r}return"N"}
function drawGacha(count){let result=[],sold=0,up=0,aw=0;for(let i=0;i<count;i++){if(player.gachaStone<=0)break;player.gachaStone--;const e=createEquipment();if(shouldAutoSell(e)){const gain=sellGain(e);player.upgradeStone+=gain.upgrade;player.awakeStone+=gain.awake;up+=gain.upgrade;aw+=gain.awake;sold++}else{player.equipments.push(e);if(result.length<20)result.push(`<span style="color:${rarityColors[e.rarity]}">${e.rarity}</span> ${slotName(e.slot)} ${e.name}`)}player.gachaExp++;while(player.gachaExp>=needGachaExp()){player.gachaExp-=needGachaExp();player.gachaLv++;showEffect("ガチャLvUP")}}document.getElementById("gachaResult").innerHTML=`表示：${result.length}件<br>`+result.join("<br>")+`<br>自動売却：${sold}個`+`<br>強化素材+${up} 覚醒素材+${aw}`;saveGame();drawAll()}
function createEnemy(){const boss=player.floor%5===0;enemy={name:boss?"階層ボス":enemyName(),maxHp:Math.floor(50*Math.pow(1.13,player.floor)*(boss?3:1)),hp:0,atk:Math.floor(5*Math.pow(1.11,player.floor)*(boss?1.8:1)),boss};enemy.hp=enemy.maxHp}function drop(base,bonusValue){return Math.random()*100<Math.min(100,base+bonusValue)}
function attack(){calcStats();let damage=Math.max(1,player.atk-Math.floor(player.floor/2));enemy.hp-=damage;if(enemy.hp<0)enemy.hp=0;let log="与ダメージ："+damage;if(Math.random()*100<bonus.multi){enemy.hp-=damage;if(enemy.hp<0)enemy.hp=0;log+="<br>連撃！+"+damage}setBattleLog(log);if(enemy.hp<=0)winBattle();else enemyAttack();drawAll()}function enemyAttack(){let damage=Math.max(1,enemy.atk-player.def);player.hp-=damage;if(player.hp<0)player.hp=0;addBattleLog("被ダメージ："+damage);if(player.hp<=0){player.floor=Math.max(1,player.floor-1);player.hp=player.maxHp;showEffect("敗北");createEnemy()}}
function rewardMult(){if(player.dungeon==="gold")return{g:5,e:1,u:.5,a:0,ga:.5};if(player.dungeon==="upgrade")return{g:.5,e:1,u:5,a:0,ga:.5};if(player.dungeon==="awake")return{g:.5,e:1,u:.5,a:5,ga:.5};if(player.dungeon==="gacha")return{g:.5,e:1,u:.5,a:0,ga:5};return{g:1,e:1,u:1,a:0,ga:1}}
function winBattle(){calcStats();const m=rewardMult(),bossBonus=enemy.boss?6:1;const gold=Math.floor(20*Math.pow(1.14,player.floor)*bossBonus*m.g*(1+bonus.gold/100)),exp=Math.floor(12*Math.pow(1.13,player.floor)*bossBonus*m.e*(1+bonus.exp/100));let gacha=0,upgrade=0,awake=0;if(enemy.boss||drop(20,bonus.gacha))gacha=Math.floor((enemy.boss?8:1)*Math.pow(1.05,player.floor)*m.ga);if(enemy.boss||drop(50,bonus.upgrade))upgrade=Math.floor((enemy.boss?15:1)*Math.pow(1.04,player.floor)*m.u);if(enemy.boss||drop(25,bonus.awake))awake=Math.floor((enemy.boss?3:1)*Math.pow(1.03,player.floor)*m.a);player.gold+=gold;player.exp+=exp;player.gachaStone+=Math.max(0,gacha);player.upgradeStone+=Math.max(0,upgrade);player.awakeStone+=Math.max(0,awake);if(enemy.boss&&player.dungeon==="normal")player.dungeonKey++;setBattleLog(enemy.name+"撃破！<br>+"+gold+"G +"+exp+"EXP<br>ガチャ+"+gacha+" 強化+"+upgrade+" 覚醒+"+awake);while(player.exp>=needExp()){player.exp-=needExp();player.level++;player.point+=5;player.baseHp+=20;player.hp=player.maxHp;showEffect("レベルUP")}player.floor+=1+Math.floor(bonus.skip/100);createEnemy();saveGame()}
function changeDungeon(type){if(type!=="normal"){if(player.dungeonKey<=0){showEffect("鍵不足");return}player.dungeonKey--}player.dungeon=type;player.floor=1;player.hp=player.maxHp;createEnemy();showEffect(dungeonName()+"へ移動");saveGame();drawAll()}
function setText(id,value){const el=document.getElementById(id);if(el)el.textContent=value}function setHTML(id,value){const el=document.getElementById(id);if(el)el.innerHTML=value}
function drawBattle(){setText("dungeonName",dungeonName());setText("floorText",player.floor+"F");setText("enemyName",enemy.name);setText("enemyAtk",enemy.atk);setText("enemyHpText",enemy.hp+" / "+enemy.maxHp);const bar=document.getElementById("enemyHpFill");if(bar&&enemy.maxHp)bar.style.width=enemy.hp/enemy.maxHp*100+"%"}
function drawStatus(){calcStats();setHTML("statusArea",`<div class="statLine"><span>Lv</span><span>${player.level}</span></div><div class="statLine"><span>HP</span><span>${Math.floor(player.hp)} / ${player.maxHp}</span></div><div class="statLine"><span>攻撃</span><span>${player.atk}</span></div><div class="statLine"><span>防御</span><span>${player.def}</span></div><div class="statLine"><span>EXP</span><span>${Math.floor(player.exp)} / ${needExp()}</span></div><div class="statLine"><span>ゴールド</span><span>${Math.floor(player.gold)}</span></div><div class="statLine"><span>ガチャ</span><span>${player.gachaStone}</span></div><div class="statLine"><span>強化素材</span><span>${player.upgradeStone}</span></div><div class="statLine"><span>覚醒素材</span><span>${player.awakeStone}</span></div><hr><div class="statLine"><span>経験値UP</span><span>+${bonus.exp}%</span></div><div class="statLine"><span>ゴールドUP</span><span>+${bonus.gold}%</span></div><div class="statLine"><span>ガチャ率</span><span>${Math.min(100,20+bonus.gacha)}%</span></div><div class="statLine"><span>強化素材率</span><span>${Math.min(100,50+bonus.upgrade)}%</span></div><div class="statLine"><span>覚醒素材率</span><span>${Math.min(100,25+bonus.awake)}%</span></div><div class="statLine"><span>ゲーム速度</span><span>+${bonus.speed}%</span></div><div class="statLine"><span>連撃率</span><span>${bonus.multi}%</span></div><div class="statLine"><span>階層スキップ</span><span>${Math.floor(bonus.skip/100)}</span></div>`)}
function drawSlotButtons(){let html=`<button class="${equipFilter==="all"?"activeSlot":""}" onclick="setEquipFilter('all')">全部</button>`;for(const [slot,label] of slots){const mark=player.equipped[slot]?"★":"";html+=`<button class="${equipFilter===slot?"activeSlot":""}" onclick="setEquipFilter('${slot}')">${mark}${label}</button>`}setHTML("slotButtons",html)}function drawBulkSellButtons(){let html="";for(const r of unlockedRarities())html+=`<button onclick="sellAll('${r}')">${r}以下売却</button>`;setHTML("bulkSellButtons",html)}function drawAutoSell(){let html=`<option value="off">OFF</option>`;for(const r of unlockedRarities())html+=`<option value="${r}" ${player.autoSell===r?"selected":""}>${r}以下</option>`;setHTML("autoSellSelect",html);const el=document.getElementById("autoSellSelect");if(el)el.value=player.autoSell}
function drawEquip(){drawSlotButtons();drawBulkSellButtons();drawAutoSell();let html="";const list=sortedEquipments();if(list.length===0){setHTML("equipList",`<div class="item">装備なし</div>`);return}for(const {e,i} of list){const equipped=player.equipped[e.slot]===e.id;html+=`<div class="item ${equipped?"equipped":""}">${equipped?'<div style="color:gold;font-weight:bold;">【装備中】</div>':""}<span style="color:${rarityColors[e.rarity]};font-weight:bold;">${e.rarity}</span> ${slotName(e.slot)} ${e.name}<br>攻撃 +${equipFinal(e,"atk")} 防御 +${equipFinal(e,"def")} HP +${equipFinal(e,"hp")}<br>品質 ${e.quality}% 強化 +${e.upgrade}/${equipLimit(e)} 覚醒 +${e.awake}<br>次強化：${upgradeGoldCost(e)}G / 強化素材${upgradeStoneCost(e)}<br>次覚醒：覚醒素材${awakeStoneCost(e)}<br>OP：${e.op1} / ${e.op2} / ${e.op3}<br><button onclick="equipItem(${i})">装備</button><button onclick="upgradeEquip(${i},1)">+1</button><button onclick="upgradeEquip(${i},10)">+10</button><button onclick="upgradeEquip(${i},100)">+100</button><button onclick="upgradeEquipMax(${i})">最大</button><button onclick="awakeEquip(${i})">覚醒</button><button onclick="sellEquip(${i})">売却</button></div>`}setHTML("equipList",html)}
function statAddValue(type){const count=type==="atk"?player.atkCount:type==="def"?player.defCount:player.hpCount;const base=type==="atk"?5:type==="def"?3:20;return base*Math.pow(2,Math.floor(count/100))}
function drawPlayerUpgrade(){setText("pointText",player.point);setHTML("pointArea",`<div class="item"><b>HP強化</b><br>次上昇：${statAddValue("hp")}<br><button onclick="addStat('hp',1)">+1</button><button onclick="addStat('hp',10)">+10</button><button onclick="addStat('hp',100)">+100</button><button onclick="addStat('hp',1000)">+1000</button><button onclick="addStatMax('hp')">最大</button></div><div class="item"><b>攻撃強化</b><br>次上昇：${statAddValue("atk")}<br><button onclick="addStat('atk',1)">+1</button><button onclick="addStat('atk',10)">+10</button><button onclick="addStat('atk',100)">+100</button><button onclick="addStat('atk',1000)">+1000</button><button onclick="addStatMax('atk')">最大</button></div><div class="item"><b>防御強化</b><br>次上昇：${statAddValue("def")}<br><button onclick="addStat('def',1)">+1</button><button onclick="addStat('def',10)">+10</button><button onclick="addStat('def',100)">+100</button><button onclick="addStat('def',1000)">+1000</button><button onclick="addStatMax('def')">最大</button></div>`);setHTML("goldUpgradeArea",`<div class="item"><b>攻撃倍率</b><br>Lv ${player.goldAtkLv} / +${player.goldAtkLv*10}%<br>次必要：${goldCost(player.goldAtkLv)}G<br><button onclick="goldUpgrade('atk',1)">+1</button><button onclick="goldUpgrade('atk',10)">+10</button><button onclick="goldUpgrade('atk',100)">+100</button><button onclick="goldUpgrade('atk',1000)">+1000</button><button onclick="goldUpgradeMax('atk')">最大</button></div><div class="item"><b>防御倍率</b><br>Lv ${player.goldDefLv} / +${player.goldDefLv*10}%<br>次必要：${goldCost(player.goldDefLv)}G<br><button onclick="goldUpgrade('def',1)">+1</button><button onclick="goldUpgrade('def',10)">+10</button><button onclick="goldUpgrade('def',100)">+100</button><button onclick="goldUpgrade('def',1000)">+1000</button><button onclick="goldUpgradeMax('def')">最大</button></div>`)}
function drawGachaUI(){setText("gachaLv",player.gachaLv);setText("gachaExp",player.gachaExp);setText("needGachaExp",needGachaExp());setText("gachaStoneText",player.gachaStone);const rates=getRates();setHTML("rateArea",rarityOrder.filter(r=>rates[r]>0).map(r=>`<span style="color:${rarityColors[r]}">${r}</span>：${rates[r].toFixed(2)}%`).join("<br>"))}function drawDungeon(){setText("currentDungeon",dungeonName());setText("dungeonKey",player.dungeonKey)}function drawAll(){drawBattle();drawStatus();drawEquip();drawPlayerUpgrade();drawGachaUI();drawDungeon()}function openTab(id,btn){currentTab=id;document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));document.getElementById(id).classList.remove("hidden");document.querySelectorAll(".tab").forEach(t=>t.classList.remove("activeTab"));btn.classList.add("activeTab");drawAll()}function setBattleLog(text){setHTML("battleLog",text)}function addBattleLog(text){const el=document.getElementById("battleLog");if(el)el.innerHTML+="<br>"+text}function showEffect(text){const div=document.createElement("div");div.className="effect";div.textContent=text;document.body.appendChild(div);setTimeout(()=>div.remove(),1000)}
function addStat(type,times){let done=0,total=0;for(let i=0;i<times;i++){if(player.point<=0)break;const add=statAddValue(type);player.point--;if(type==="atk"){player.baseAtk+=add;player.atkCount++}if(type==="def"){player.baseDef+=add;player.defCount++}if(type==="hp"){player.baseHp+=add;player.hp+=add;player.hpCount++}total+=add;done++}showEffect(done>0?"強化+"+total:"ポイント不足");saveGame();drawAll()}function addStatMax(type){addStat(type,player.point)}function goldUpgrade(type,times){let done=0;for(let i=0;i<times;i++){const lv=type==="atk"?player.goldAtkLv:player.goldDefLv,cost=goldCost(lv);if(player.gold<cost)break;player.gold-=cost;if(type==="atk")player.goldAtkLv++;else player.goldDefLv++;done++}showEffect(done>0?"ゴールド強化+"+done:"ゴールド不足");saveGame();drawAll()}function goldUpgradeMax(type){let done=0;while(true){const lv=type==="atk"?player.goldAtkLv:player.goldDefLv,cost=goldCost(lv);if(player.gold<cost)break;player.gold-=cost;if(type==="atk")player.goldAtkLv++;else player.goldDefLv++;done++;if(done>100000)break}showEffect(done>0?"最大強化+"+done:"ゴールド不足");saveGame();drawAll()}
createEnemy();drawAll();let last=0;function gameLoop(time){const interval=Math.max(100,1000-bonus.speed*5);if(time-last>=interval){attack();last=time}requestAnimationFrame(gameLoop)}requestAnimationFrame(gameLoop);
</script>
</body>
</html>
