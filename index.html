<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>階層突破ハクスラRPG</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

  <div id="battleTab">
    <div class="panel">
      <div class="big">
        <span id="dungeonName"></span>
        <span id="floor"></span>
      </div>

      <div>敵：<span id="enemyName"></span></div>
      <div>敵攻撃：<span id="enemyAtk"></span></div>

      <div class="hpbar">
        <div id="enemyHpFill" class="hpfill"></div>
      </div>

      <div id="enemyHpText"></div>
      <div id="battleLog" class="log"></div>
    </div>

    <div class="panel">
      <div class="big">ステータス</div>
      <div id="statusList"></div>
    </div>
  </div>

  <div id="equipTab" class="hidden">
    <div class="panel">
      <div class="big">装備</div>

      <div id="slotButtons"></div>

      <select onchange="sortType=this.value;renderEquipList();">
        <option value="new">新着順</option>
        <option value="rarity">レア順</option>
        <option value="power">戦力順</option>
        <option value="upgrade">強化順</option>
        <option value="awake">覚醒順</option>
      </select>

      <div class="small">一括売却</div>
      <div id="bulkSellButtons"></div>

      <div class="small">自動売却</div>
      <select id="autoSellSelect"
        onchange="setAutoSell(this.value)">
      </select>

      <div id="equipList"></div>
    </div>
  </div>

  <div id="playerTab" class="hidden">
    <div class="panel">
      <div class="big">強化</div>

      <div>
        ポイント：
        <span id="point"></span>
      </div>

      <div id="playerUpgradeArea"></div>
    </div>
  </div>

  <div id="gachaTab" class="hidden">
    <div class="panel">
      <div class="big">ガチャ</div>

      <div>
        ガチャLv：
        <span id="gachaLv"></span>
      </div>

      <div>
        ガチャEXP：
        <span id="gachaExp"></span>
        /
        <span id="needGachaExp"></span>
      </div>

      <div>
        ガチャアイテム：
        <span id="gachaStone2"></span>
      </div>

      <hr>

      <div id="rateText"></div>

      <button onclick="gacha(1)">1回</button>
      <button onclick="gacha(10)">10回</button>
      <button onclick="gacha(100)">100回</button>

      <div id="gachaResult" class="log"></div>
    </div>
  </div>

  <div id="dungeonTab" class="hidden">
    <div class="panel">
      <div class="big">ダンジョン</div>

      <div>
        現在：
        <span id="currentDungeon"></span>
      </div>

      <div>
        鍵：
        <span id="dungeonKey"></span>
      </div>

      <button onclick="changeDungeon('normal')">
        通常階層
      </button>

      <button onclick="changeDungeon('gold')">
        ゴールドD
      </button>

      <button onclick="changeDungeon('upgrade')">
        強化素材D
      </button>

      <button onclick="changeDungeon('awake')">
        覚醒素材D
      </button>

      <button onclick="changeDungeon('gacha')">
        ガチャD
      </button>
    </div>
  </div>

</div>

<div class="tabbar">

  <div class="tab active"
    onclick="showTab('battleTab',this)">
    戦闘
  </div>

  <div class="tab"
    onclick="showTab('equipTab',this)">
    装備
  </div>

  <div class="tab"
    onclick="showTab('playerTab',this)">
    強化
  </div>

  <div class="tab"
    onclick="showTab('gachaTab',this)">
    ガチャ
  </div>

  <div class="tab"
    onclick="showTab('dungeonTab',this)">
    D
  </div>

</div>

<script src="data.js"></script>
<script src="save.js"></script>
<script src="state.js"></script>
<script src="equip.js"></script>
<script src="gacha.js"></script>
<script src="battle.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>

</body>
</html>
